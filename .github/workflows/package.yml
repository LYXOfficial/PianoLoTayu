# Build standalone GUI via `make package` for Linux / Windows.
# Artifact: pianolotayu-{version}-{linux|windows}-{x64|x86|arm64}.tar.xz
# Release:  pianolotayu-{version}-linux-{x64|arm64}.tar.xz
#           pianolotayu-{version}-windows-{x64}.zip
#
# Triggers: tag v*, manual dispatch (optional draft release).

name: package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Upload assets to a GitHub Release (draft if not a tag)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'(?m)^version\s*=\s*["\']([^"\']+)["\']', text)
          assert m, "version not found in pyproject.toml"
          print(m.group(1))
          PY
          )"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${V}"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux native
          - target_os: linux
            arch: x64
            runs-on: ubuntu-24.04
          - target_os: linux
            arch: arm64
            runs-on: ubuntu-24.04-arm

          # Windows — x64 only (MSYS2 make + host uv Python)
          - target_os: windows
            arch: x64
            runs-on: windows-latest
            msystem: MINGW64

    name: ${{ matrix.target_os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.experimental == true }}
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      ARTIFACT: pianolotayu-${{ needs.meta.outputs.version }}-${{ matrix.target_os }}-${{ matrix.arch }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Linux system deps ──────────────────────────────────────────────────
      - name: Install Linux system packages
        if: matrix.target_os == 'linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            patchelf \
            pkg-config \
            curl \
            zip \
            unzip \
            upx-ucl \
            fluidsynth \
            libfluidsynth3 \
            libfluidsynth-dev \
            libgl1 \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libx11-xcb1 \
            libfontconfig1 \
            libfreetype6 \
            qt6-base-dev \
            libqt6core6 \
            libqt6gui6 \
            libqt6widgets6
          # alsa package name differs across Ubuntu releases
          sudo apt-get install -y --no-install-recommends libasound2t64 \
            || sudo apt-get install -y --no-install-recommends libasound2
          upx --version || upx-ucl --version || true
          fluidsynth --version || true

      - name: Set up uv (host)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      # ── Windows MSYS2 (make/tar/curl/zip only; Python via uv) ───────────────
      - name: Set up MSYS2
        if: matrix.target_os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: make tar curl zip unzip git

      - name: Verify MSYS2 tools
        if: matrix.target_os == 'windows'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          make --version
          command -v make
          command -v curl
          command -v tar
          command -v zip

      # ── Build ──────────────────────────────────────────────────────────────
      - name: make package (Linux)
        if: matrix.target_os == 'linux'
        run: |
          set -euxo pipefail
          uv --version
          make package
          test -x build/entry.dist/pianolotayu-gui
          printf '%s\n' \
            "Linux build: install fluidsynth from your distro if audio export fails." \
            "  e.g. sudo apt install fluidsynth libfluidsynth3" \
            > build/entry.dist/README-linux.txt

      - name: make package (Windows / MSYS2)
        if: matrix.target_os == 'windows'
        shell: msys2 {0}
        env:
          # Makefile branches on OS=Windows_NT
          OS: Windows_NT
          # Inherit Actions PATH so Windows uv.exe is visible inside MSYS2
          MSYS2_PATH_TYPE: inherit
        run: |
          set -euxo pipefail
          hash -r || true
          command -v uv
          uv --version
          make package
          test -f build/entry.dist/pianolotayu-gui.exe
          ls -lah build/entry.dist/ | head -40

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Tar artifact
        run: |
          set -euxo pipefail
          (cd build/entry.dist && tar -cJf "../../${ARTIFACT}.tar.xz" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ format('{0}.tar.xz', env.ARTIFACT) }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    needs: [meta, build]
    if: >-
      always() &&
      needs.build.result != 'cancelled' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       inputs.create_release == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package & flatten
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name="$(basename "$dir")"
            case "$name" in
              *linux*)
                echo "moving ${name}.tar.xz"
                mv "${dir}/${name}.tar.xz" "release-assets/${name}.tar.xz"
                ;;
              *)
                echo "packaging ${name}.zip"
                (cd "$dir" && tar -xJf "${name}.tar.xz" && rm "${name}.tar.xz" && zip -r -9 "../../release-assets/${name}.zip" .)
                ;;
            esac
          done
          ls -lah release-assets/
          test "$(ls -A release-assets)" || { echo "no assets produced"; exit 1; }

      - name: Package soundfonts
        shell: bash
        run: |
          set -euxo pipefail
          # Checkout soundfonts branch and zip its contents
          git fetch origin soundfonts
          git checkout origin/soundfonts
          zip -r -9 release-assets/soundfonts.zip soundfonts/ -x "*.git*"
          ls -lah release-assets/soundfonts.zip
          # Switch back to original branch for release step
          git checkout -

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.meta.outputs.version) }}
          name: PianoLoTayu ${{ needs.meta.outputs.version }}
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
